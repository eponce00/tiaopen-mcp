<?xml version="1.0" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" class="svghmi">
  <rect width="1200" height="800" fill="#E8E8E8"/>
  <text x="600.0" y="25" font-family="Arial, sans-serif" font-size="18" fill="#000000" text-anchor="middle" font-weight="bold">Kistler maXYmos NC Press Controller</text>
  <rect x="20" y="20" width="300" height="150" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="4"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="start" font-weight="bold">STATUS</text>
  <g class="indicator ready" data-param="ready">
    <rect x="30" y="55" width="60" height="30" fill="#DCDCDC" stroke="#666" stroke-width="1" rx="4"/>
    <circle cx="60.0" cy="70.0" r="12" fill="#CCCCCC" stroke="#666" stroke-width="1" class="led ready" data-param="ready"/>
    <text x="60.0" y="100" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="middle">Ready</text>
  </g>
  <g class="indicator okTotal" data-param="okTotal">
    <rect x="120" y="55" width="60" height="30" fill="#DCDCDC" stroke="#666" stroke-width="1" rx="4"/>
    <circle cx="150.0" cy="70.0" r="12" fill="#CCCCCC" stroke="#666" stroke-width="1" class="led okTotal" data-param="okTotal"/>
    <text x="150.0" y="100" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="middle">OK</text>
  </g>
  <g class="indicator nokTotal" data-param="nokTotal">
    <rect x="210" y="55" width="60" height="30" fill="#DCDCDC" stroke="#666" stroke-width="1" rx="4"/>
    <circle cx="240.0" cy="70.0" r="12" fill="#CCCCCC" stroke="#666" stroke-width="1" class="led nokTotal" data-param="nokTotal"/>
    <text x="240.0" y="100" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="middle">NOK</text>
  </g>
  <g class="indicator driveEnabled" data-param="driveEnabled">
    <rect x="30" y="105" width="60" height="30" fill="#DCDCDC" stroke="#666" stroke-width="1" rx="4"/>
    <circle cx="60.0" cy="120.0" r="12" fill="#CCCCCC" stroke="#666" stroke-width="1" class="led driveEnabled" data-param="driveEnabled"/>
    <text x="60.0" y="150" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="middle">Drive</text>
  </g>
  <g class="indicator homePos" data-param="homePos">
    <rect x="120" y="105" width="60" height="30" fill="#DCDCDC" stroke="#666" stroke-width="1" rx="4"/>
    <circle cx="150.0" cy="120.0" r="12" fill="#CCCCCC" stroke="#666" stroke-width="1" class="led homePos" data-param="homePos"/>
    <text x="150.0" y="150" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="middle">Home</text>
  </g>
  <g class="indicator referencePos" data-param="referencePos">
    <rect x="210" y="105" width="60" height="30" fill="#DCDCDC" stroke="#666" stroke-width="1" rx="4"/>
    <circle cx="240.0" cy="120.0" r="12" fill="#CCCCCC" stroke="#666" stroke-width="1" class="led referencePos" data-param="referencePos"/>
    <text x="240.0" y="150" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="middle">Ref</text>
  </g>
  <rect x="20" y="190" width="300" height="280" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="4"/>
  <text x="30" y="210" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="start" font-weight="bold">CONTROLS</text>
  <g class="button autoRunSequence" data-param="autoRunSequence">
    <rect x="30" y="225" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="67.5" y="247.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Start</text>
  </g>
  <g class="button extStopRequest" data-param="extStopRequest">
    <rect x="180" y="225" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="217.5" y="247.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Stop</text>
  </g>
  <g class="button autoHomePosition" data-param="autoHomePosition">
    <rect x="30" y="275" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="67.5" y="297.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Home</text>
  </g>
  <g class="button autoDriveToReferencePosition" data-param="autoDriveToReferencePosition">
    <rect x="180" y="275" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="217.5" y="297.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Ref</text>
  </g>
  <g class="button JogFwd" data-param="JogFwd">
    <rect x="30" y="325" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="67.5" y="347.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Jog+</text>
  </g>
  <g class="button JogNeq" data-param="JogNeq">
    <rect x="180" y="325" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="217.5" y="347.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Jog-</text>
  </g>
  <g class="button SequenceEndReset" data-param="SequenceEndReset">
    <rect x="30" y="375" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="67.5" y="397.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Reset</text>
  </g>
  <g class="button enableBlock" data-param="enableBlock">
    <rect x="180" y="375" width="75" height="35" fill="#CCCCCC" stroke="#666" stroke-width="2" rx="4"/>
    <text x="217.5" y="397.5" font-family="Arial, sans-serif" font-size="12" fill="#000000" text-anchor="middle">Enable</text>
  </g>
