  <text x="910" y="425" font-family="Arial, sans-serif" font-size="10" fill="#000000" text-anchor="start">Drive NOK</text>
  <circle cx="895" cy="450" r="6" fill="#CCCCCC" stroke="#666" stroke-width="1" class="alarm-led safetyNOK" data-param="safetyNOK"/>
  <text x="910" y="455" font-family="Arial, sans-serif" font-size="10" fill="#000000" text-anchor="start">Safety NOK</text>
