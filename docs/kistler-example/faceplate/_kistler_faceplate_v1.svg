  <text x="1080" y="140" font-family="Arial, sans-serif" font-size="11" fill="#00AA00" text-anchor="end" class="value readyStatus" data-param="ready">Ready</text>
  <rect x="880" y="340" width="300" height="310" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="4"/>
  <text x="890" y="360" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="start" font-weight="bold">ALARMS &amp; FAULTS</text>
