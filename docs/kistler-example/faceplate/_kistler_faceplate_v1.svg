  <text x="910" y="485" font-family="Arial, sans-serif" font-size="10" fill="#000000" text-anchor="start">Serial Mismatch</text>
  <circle cx="895" cy="510" r="6" fill="#CCCCCC" stroke="#666" stroke-width="1" class="alarm-led transmissionFault" data-param="transmissionFault"/>
  <text x="910" y="515" font-family="Arial, sans-serif" font-size="10" fill="#000000" text-anchor="start">Transmission</text>
  <circle cx="895" cy="540" r="6" fill="#CCCCCC" stroke="#666" stroke-width="1" class="alarm-led remoteControlNotActive" data-param="remoteControlNotActive"/>
  <text x="910" y="545" font-family="Arial, sans-serif" font-size="10" fill="#000000" text-anchor="start">User Mode Active</text>
