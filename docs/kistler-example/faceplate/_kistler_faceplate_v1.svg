  <text x="690" y="570" font-family="Arial, sans-serif" font-size="11" fill="#0066FF" text-anchor="start" class="value sequenceStatus" data-param="sequenceStatus">IDLE</text>
  <rect x="880" y="20" width="300" height="300" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="4"/>
  <text x="890" y="40" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="start" font-weight="bold">MP SELECTION</text>
  <text x="890" y="70" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="start">MP #:</text>
  <text x="1080" y="70" font-family="Arial, sans-serif" font-size="11" fill="#0066FF" text-anchor="end" class="value mpNumber" data-param="MeasurementProgramEcho">0</text>
  <text x="890" y="105" font-family="Arial, sans-serif" font-size="11" fill="#000000" text-anchor="start">Sequence:</text>
  <text x="1080" y="105" font-family="Arial, sans-serif" font-size="11" fill="#0066FF" text-anchor="end" class="value sequenceLabel" data-param="currentLabel">Main</text>
