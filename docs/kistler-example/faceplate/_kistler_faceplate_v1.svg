  <text x="350" y="530" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">Force:</text>
  <text x="430" y="530" font-family="Arial, sans-serif" font-size="11" fill="#0066FF" text-anchor="start" class="value pvCurrentValueY" data-param="pvCurrentValueY">0.0 N</text>
  <text x="610" y="530" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="start">Distance:</text>
  <text x="690" y="530" font-family="Arial, sans-serif" font-size="11" fill="#0066FF" text-anchor="start" class="value pvCurrentValueX" data-param="pvCurrentValueX">0.0 mm</text>
